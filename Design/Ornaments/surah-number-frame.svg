<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!--
    Small octagonal decorative frame for displaying surah numbers.
    Octagonal border with tiny corner accents.
    Clear interior for number overlay.
    Gold #B08D3E, thin lines.
  -->
  <defs>
    <style>
      .o { fill: none; stroke: #B08D3E; stroke-width: 0.5; stroke-linecap: round; stroke-linejoin: round; }
      .ot { fill: none; stroke: #B08D3E; stroke-width: 0.35; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #B08D3E; stroke: none; }
    </style>
  </defs>
  <g>
    <!-- Outer octagon, circumradius=18, center (20,20) -->
    <!-- Vertices at 22.5 deg offsets: k*45 + 22.5 deg -->
    <polygon class="o" points="
      26.63,3.11
      36.89,13.37
      36.89,26.63
      26.63,36.89
      13.37,36.89
      3.11,26.63
      3.11,13.37
      13.37,3.11
    "/>

    <!-- Inner octagon, circumradius=14.5 -->
    <polygon class="o" points="
      25.34,5.70
      34.30,14.66
      34.30,25.34
      25.34,34.30
      14.66,34.30
      5.70,25.34
      5.70,14.66
      14.66,5.70
    "/>

    <!-- Corner accent marks: tiny lines extending outward at each vertex -->
    <!-- Top-right vertex -->
    <line class="ot" x1="26.63" y1="3.11" x2="28" y2="1.75"/>
    <!-- Right-top vertex -->
    <line class="ot" x1="36.89" y1="13.37" x2="38.25" y2="12"/>
    <!-- Right-bottom vertex -->
    <line class="ot" x1="36.89" y1="26.63" x2="38.25" y2="28"/>
    <!-- Bottom-right vertex -->
    <line class="ot" x1="26.63" y1="36.89" x2="28" y2="38.25"/>
    <!-- Bottom-left vertex -->
    <line class="ot" x1="13.37" y1="36.89" x2="12" y2="38.25"/>
    <!-- Left-bottom vertex -->
    <line class="ot" x1="3.11" y1="26.63" x2="1.75" y2="28"/>
    <!-- Left-top vertex -->
    <line class="ot" x1="3.11" y1="13.37" x2="1.75" y2="12"/>
    <!-- Top-left vertex -->
    <line class="ot" x1="13.37" y1="3.11" x2="12" y2="1.75"/>

    <!-- Tiny dots at each corner accent end -->
    <circle class="dot" cx="28" cy="1.75" r="0.4"/>
    <circle class="dot" cx="38.25" cy="12" r="0.4"/>
    <circle class="dot" cx="38.25" cy="28" r="0.4"/>
    <circle class="dot" cx="28" cy="38.25" r="0.4"/>
    <circle class="dot" cx="12" cy="38.25" r="0.4"/>
    <circle class="dot" cx="1.75" cy="28" r="0.4"/>
    <circle class="dot" cx="1.75" cy="12" r="0.4"/>
    <circle class="dot" cx="12" cy="1.75" r="0.4"/>

    <!-- Tiny accent dots at midpoints of outer octagon edges -->
    <circle class="dot" cx="20" cy="3.11" r="0.35"/>
    <circle class="dot" cx="36.89" cy="20" r="0.35"/>
    <circle class="dot" cx="20" cy="36.89" r="0.35"/>
    <circle class="dot" cx="3.11" cy="20" r="0.35"/>

    <!-- Small connecting dashes at edge midpoints between inner and outer octagons -->
    <line class="ot" x1="20" y1="3.11" x2="20" y2="5.70"/>
    <line class="ot" x1="36.89" y1="20" x2="34.30" y2="20"/>
    <line class="ot" x1="20" y1="36.89" x2="20" y2="34.30"/>
    <line class="ot" x1="3.11" y1="20" x2="5.70" y2="20"/>
  </g>
</svg>