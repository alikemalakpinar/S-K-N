<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 24" width="280" height="24">
  <!--
    Horizontal divider for bismillah sections.
    Central small octagonal medallion with thin extending lines.
    Tiny diamond terminals at ends.
    Clean, delicate, restrained design.
    Gold #B08D3E.
  -->
  <defs>
    <style>
      .l { fill: none; stroke: #B08D3E; stroke-width: 0.5; stroke-linecap: round; stroke-linejoin: round; }
      .lt { fill: none; stroke: #B08D3E; stroke-width: 0.35; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #B08D3E; stroke: none; }
    </style>
  </defs>
  <g>
    <!-- Central octagonal medallion -->
    <!-- Regular octagon centered at (140,12), circumradius=8 -->
    <polygon class="l" points="
      143.06,4.69
      147.31,8.94
      147.31,15.06
      143.06,19.31
      136.94,19.31
      132.69,15.06
      132.69,8.94
      136.94,4.69
    "/>
    <!-- Inner octagon, circumradius=5 -->
    <polygon class="l" points="
      141.91,7.93
      144.07,10.09
      144.07,13.91
      141.91,16.07
      138.09,16.07
      135.93,13.91
      135.93,10.09
      138.09,7.93
    "/>
    <!-- Tiny dot at center -->
    <circle class="dot" cx="140" cy="12" r="0.8"/>
    <!-- Small accent lines inside octagon -->
    <line class="lt" x1="140" y1="7.93" x2="140" y2="4.69"/>
    <line class="lt" x1="140" y1="16.07" x2="140" y2="19.31"/>
    <line class="lt" x1="135.93" y1="12" x2="132.69" y2="12"/>
    <line class="lt" x1="144.07" y1="12" x2="147.31" y2="12"/>

    <!-- Extending horizontal lines - left side -->
    <!-- Main line -->
    <line class="l" x1="132.69" y1="12" x2="16" y2="12"/>
    <!-- Thin parallel accent line above -->
    <line class="lt" x1="128" y1="10" x2="24" y2="10"/>
    <!-- Thin parallel accent line below -->
    <line class="lt" x1="128" y1="14" x2="24" y2="14"/>

    <!-- Small accent marks on left line -->
    <circle class="dot" cx="100" cy="12" r="0.5"/>
    <circle class="dot" cx="70" cy="12" r="0.4"/>
    <circle class="dot" cx="40" cy="12" r="0.4"/>

    <!-- Tiny cross-marks on left -->
    <line class="lt" x1="85" y1="10" x2="85" y2="14"/>
    <line class="lt" x1="55" y1="10" x2="55" y2="14"/>

    <!-- Left terminal: diamond -->
    <polygon class="dot" points="16,12 13,10 10,12 13,14"/>
    <polygon class="l" points="16,12 13,9.5 10,12 13,14.5"/>
    <!-- Tiny end dot -->
    <circle class="dot" cx="7" cy="12" r="0.5"/>
    <line class="lt" x1="10" y1="12" x2="7.5" y2="12"/>

    <!-- Extending horizontal lines - right side -->
    <line class="l" x1="147.31" y1="12" x2="264" y2="12"/>
    <line class="lt" x1="152" y1="10" x2="256" y2="10"/>
    <line class="lt" x1="152" y1="14" x2="256" y2="14"/>

    <!-- Small accent marks on right line -->
    <circle class="dot" cx="180" cy="12" r="0.5"/>
    <circle class="dot" cx="210" cy="12" r="0.4"/>
    <circle class="dot" cx="240" cy="12" r="0.4"/>

    <!-- Tiny cross-marks on right -->
    <line class="lt" x1="195" y1="10" x2="195" y2="14"/>
    <line class="lt" x1="225" y1="10" x2="225" y2="14"/>

    <!-- Right terminal: diamond -->
    <polygon class="dot" points="264,12 267,10 270,12 267,14"/>
    <polygon class="l" points="264,12 267,9.5 270,12 267,14.5"/>
    <circle class="dot" cx="273" cy="12" r="0.5"/>
    <line class="lt" x1="270" y1="12" x2="272.5" y2="12"/>
  </g>
</svg>