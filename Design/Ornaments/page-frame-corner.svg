<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!--
    Corner ornament for Quran page frame.
    L-shaped corner with delicate arabesque/floral details.
    Designed for top-left corner; rotate 90/180/270 for other corners.
    Gold #B08D3E, thin lines.
  -->
  <defs>
    <style>
      .o { fill: none; stroke: #B08D3E; stroke-width: 0.5; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #B08D3E; stroke: none; }
    </style>
  </defs>
  <g>
    <!-- L-shaped corner frame lines -->
    <!-- Outer L -->
    <path class="o" d="M 4,2 L 46,2 L 46,6 L 6,6 L 6,46 L 2,46 L 2,4 Q 2,2 4,2 Z"/>
    <!-- Inner L (thinner offset) -->
    <path class="o" d="M 8,5 L 43,5 M 5,8 L 5,43"/>

    <!-- Corner medallion: small arabesque rosette at the corner -->
    <!-- Tiny 4-petal floral at corner (4,4) area -->
    <circle class="o" cx="4" cy="4" r="2.5"/>
    <circle class="o" cx="4" cy="4" r="1.2"/>
    <!-- 4 tiny petals -->
    <path class="o" d="M 4,1.5 Q 5.5,3 4,4"/>
    <path class="o" d="M 4,1.5 Q 2.5,3 4,4"/>
    <path class="o" d="M 6.5,4 Q 5,5.5 4,4"/>
    <path class="o" d="M 6.5,4 Q 5,2.5 4,4"/>
    <path class="o" d="M 4,6.5 Q 2.5,5 4,4"/>
    <path class="o" d="M 4,6.5 Q 5.5,5 4,4"/>
    <path class="o" d="M 1.5,4 Q 3,2.5 4,4"/>
    <path class="o" d="M 1.5,4 Q 3,5.5 4,4"/>

    <!-- Arabesque scrollwork along top edge -->
    <!-- Gentle S-curves with tiny leaf terminals -->
    <path class="o" d="M 10,4 Q 14,1.5 18,4 Q 22,6.5 26,4"/>
    <path class="o" d="M 26,4 Q 29,2 32,4 Q 35,6 38,4"/>
    <!-- Tiny leaf at end -->
    <path class="o" d="M 38,4 Q 40,2.5 42,4"/>
    <path class="o" d="M 38,4 Q 40,5.5 42,4"/>

    <!-- Arabesque scrollwork along left edge -->
    <path class="o" d="M 4,10 Q 1.5,14 4,18 Q 6.5,22 4,26"/>
    <path class="o" d="M 4,26 Q 2,29 4,32 Q 6,35 4,38"/>
    <!-- Tiny leaf at end -->
    <path class="o" d="M 4,38 Q 2.5,40 4,42"/>
    <path class="o" d="M 4,38 Q 5.5,40 4,42"/>

    <!-- Accent dots along the edges -->
    <circle class="dot" cx="10" cy="2" r="0.4"/>
    <circle class="dot" cx="18" cy="2" r="0.4"/>
    <circle class="dot" cx="26" cy="2" r="0.4"/>
    <circle class="dot" cx="34" cy="2" r="0.4"/>
    <circle class="dot" cx="42" cy="2" r="0.4"/>

    <circle class="dot" cx="2" cy="10" r="0.4"/>
    <circle class="dot" cx="2" cy="18" r="0.4"/>
    <circle class="dot" cx="2" cy="26" r="0.4"/>
    <circle class="dot" cx="2" cy="34" r="0.4"/>
    <circle class="dot" cx="2" cy="42" r="0.4"/>

    <!-- Small accent dots at intersection -->
    <circle class="dot" cx="6" cy="6" r="0.3"/>

    <!-- Tiny diamond accent near corner -->
    <polygon class="dot" points="4,8.5 4.5,9 4,9.5 3.5,9"/>
    <polygon class="dot" points="8.5,4 9,4.5 8.5,5 8,4.5"/>

    <!-- Terminal dots at line ends -->
    <circle class="dot" cx="46" cy="4" r="0.5"/>
    <circle class="dot" cx="4" cy="46" r="0.5"/>
  </g>
</svg>