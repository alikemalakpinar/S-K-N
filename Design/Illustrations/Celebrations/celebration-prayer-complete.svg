<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Dome/arc above the five circles -->
  <path d="M12 62 Q20 18 60 12 Q100 18 108 62" />
  <!-- Inner dome line for depth -->
  <path d="M18 62 Q26 24 60 18 Q94 24 102 62" />
  <!-- Five prayer circles -->
  <circle cx="24" cy="72" r="8" />
  <circle cx="42" cy="72" r="8" />
  <circle cx="60" cy="72" r="8" />
  <circle cx="78" cy="72" r="8" />
  <circle cx="96" cy="72" r="8" />
  <!-- Radiating lines from each circle -->
  <!-- Prayer 1 (Fajr) -->
  <line x1="24" y1="62" x2="24" y2="56" />
  <line x1="18" y1="64" x2="14" y2="60" />
  <line x1="30" y1="64" x2="34" y2="60" />
  <!-- Prayer 2 (Dhuhr) -->
  <line x1="42" y1="62" x2="42" y2="56" />
  <line x1="36" y1="64" x2="32" y2="60" />
  <line x1="48" y1="64" x2="52" y2="60" />
  <!-- Prayer 3 (Asr) -->
  <line x1="60" y1="62" x2="60" y2="56" />
  <line x1="54" y1="64" x2="50" y2="60" />
  <line x1="66" y1="64" x2="70" y2="60" />
  <!-- Prayer 4 (Maghrib) -->
  <line x1="78" y1="62" x2="78" y2="56" />
  <line x1="72" y1="64" x2="68" y2="60" />
  <line x1="84" y1="64" x2="88" y2="60" />
  <!-- Prayer 5 (Isha) -->
  <line x1="96" y1="62" x2="96" y2="56" />
  <line x1="90" y1="64" x2="86" y2="60" />
  <line x1="102" y1="64" x2="106" y2="60" />
  <!-- Small dots inside each circle (check/complete indicator) -->
  <circle cx="24" cy="72" r="2" fill="#B08D3E" stroke="none" />
  <circle cx="42" cy="72" r="2" fill="#B08D3E" stroke="none" />
  <circle cx="60" cy="72" r="2" fill="#B08D3E" stroke="none" />
  <circle cx="78" cy="72" r="2" fill="#B08D3E" stroke="none" />
  <circle cx="96" cy="72" r="2" fill="#B08D3E" stroke="none" />
  <!-- Connecting baseline -->
  <line x1="16" y1="86" x2="104" y2="86" />
  <!-- Small decorative dots below baseline -->
  <circle cx="24" cy="92" r="1" fill="#B08D3E" stroke="none" />
  <circle cx="42" cy="92" r="1" fill="#B08D3E" stroke="none" />
  <circle cx="60" cy="92" r="1" fill="#B08D3E" stroke="none" />
  <circle cx="78" cy="92" r="1" fill="#B08D3E" stroke="none" />
  <circle cx="96" cy="92" r="1" fill="#B08D3E" stroke="none" />
  <!-- Top decorative element - crescent at dome peak -->
  <path d="M57 10 A4 4 0 1 0 57 18 A3 3 0 1 1 57 10" />
</svg>
