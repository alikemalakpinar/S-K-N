<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <!-- Simplified path/road ahead - Travel Dua -->
  <!-- Secondary: road surface -->
  <path d="M8 22L11 4H13L16 22Z" fill="#B08D3E" opacity="0.12"/>
  <!-- Primary: road edges converging to vanishing point -->
  <line x1="7" y1="22" x2="11" y2="4" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17" y1="22" x2="13" y2="4" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dashes (road markings) -->
  <line x1="12" y1="20" x2="12" y2="17" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="12" y1="14.5" x2="12" y2="12.5" stroke="#B08D3E" stroke-width="1.3" stroke-linecap="round" opacity="0.4"/>
  <line x1="12" y1="10.5" x2="12" y2="9.5" stroke="#B08D3E" stroke-width="1.1" stroke-linecap="round" opacity="0.3"/>
  <!-- Horizon dot / vanishing point -->
  <circle cx="12" cy="4" r="1.5" fill="#B08D3E" opacity="0.4"/>
  <!-- Small side marks for depth -->
  <line x1="4" y1="22" x2="6" y2="22" stroke="#B08D3E" stroke-width="1" stroke-linecap="round" opacity="0.2"/>
  <line x1="18" y1="22" x2="20" y2="22" stroke="#B08D3E" stroke-width="1" stroke-linecap="round" opacity="0.2"/>
</svg>
