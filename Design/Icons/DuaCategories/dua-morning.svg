<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <!-- Sunrise with radiating lines - Morning Dua -->
  <!-- Secondary: sun glow -->
  <circle cx="12" cy="16" r="5" fill="#B08D3E" opacity="0.15"/>
  <!-- Horizon line -->
  <line x1="2" y1="16" x2="22" y2="16" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Sun half-circle above horizon -->
  <path d="M7 16C7 13.2 9.2 11 12 11C14.8 11 17 13.2 17 16" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round" fill="#B08D3E" fill-opacity="0.25"/>
  <!-- Radiating lines -->
  <line x1="12" y1="8" x2="12" y2="5" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="7.5" y1="9.5" x2="5.5" y2="7.5" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="16.5" y1="9.5" x2="18.5" y2="7.5" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="5" y1="13" x2="3" y2="12" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="19" y1="13" x2="21" y2="12" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Ground shadow lines -->
  <line x1="4" y1="19" x2="10" y2="19" stroke="#B08D3E" stroke-width="1" stroke-linecap="round" opacity="0.2"/>
  <line x1="14" y1="19" x2="20" y2="19" stroke="#B08D3E" stroke-width="1" stroke-linecap="round" opacity="0.2"/>
</svg>
