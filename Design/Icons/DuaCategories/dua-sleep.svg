<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <!-- Closed eye with small crescent - Sleep Dua -->
  <!-- Secondary: eyelid area -->
  <path d="M3 12C3 12 7 16 12 16C17 16 21 12 21 12C21 12 17 8 12 8C7 8 3 12 3 12Z" fill="#B08D3E" opacity="0.1"/>
  <!-- Primary: closed eye - curved line -->
  <path d="M3 12C3 12 7 16 12 16C17 16 21 12 21 12" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Eyelashes -->
  <line x1="6" y1="14.5" x2="5" y2="16.5" stroke="#B08D3E" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="9" y1="15.5" x2="8.5" y2="17.5" stroke="#B08D3E" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="12" y1="16" x2="12" y2="18" stroke="#B08D3E" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="15" y1="15.5" x2="15.5" y2="17.5" stroke="#B08D3E" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="18" y1="14.5" x2="19" y2="16.5" stroke="#B08D3E" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <!-- Small crescent above eye -->
  <path d="M17 5C15.5 5 14.5 6 14.5 7.2C14.5 8.4 15.5 9.2 17 9.2C16 8.8 15.5 8 15.5 7.2C15.5 6.4 16 5.5 17 5Z" stroke="#B08D3E" stroke-width="1.2" stroke-linecap="round" fill="#B08D3E" fill-opacity="0.35"/>
  <!-- Small stars/dots -->
  <circle cx="10" cy="6" r="0.6" fill="#B08D3E" opacity="0.4"/>
  <circle cx="12.5" cy="4.5" r="0.5" fill="#B08D3E" opacity="0.3"/>
</svg>
