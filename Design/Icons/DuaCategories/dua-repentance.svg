  <!-- Left hand -->
  <path d="M5 20C5 20 4 14 4.5 11C5 8 6 6 7 5.5C8 5 8.5 5.5 8.5 6.5L8.5 9" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left palm -->
  <path d="M5 20L8.5 14L9.5 10C9.5 9 9.5 8 8.5 8" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M5 20L8.5 14L9.5 10L8.5 9L8.5 6.5C8.5 5.5 7 5 7 5.5C6 6 5 8 4.5 11C4 14 5 20 5 20Z" fill="#B08D3E" opacity="0.2"/>
  <!-- Right hand -->
  <path d="M19 20C19 20 20 14 19.5 11C19 8 18 6 17 5.5C16 5 15.5 5.5 15.5 6.5L15.5 9" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right palm -->
  <path d="M19 20L15.5 14L14.5 10C14.5 9 14.5 8 15.5 8" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M19 20L15.5 14L14.5 10L15.5 9L15.5 6.5C15.5 5.5 17 5 17 5.5C18 6 19 8 19.5 11C20 14 19 20 19 20Z" fill="#B08D3E" opacity="0.2"/>
  <!-- Small light lines between palms -->
  <line x1="10.5" y1="8" x2="13.5" y2="8" stroke="#B08D3E" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
  <line x1="10" y1="10" x2="14" y2="10" stroke="#B08D3E" stroke-width="0.8" stroke-linecap="round" opacity="0.25"/>
  <line x1="10" y1="12" x2="14" y2="12" stroke="#B08D3E" stroke-width="0.8" stroke-linecap="round" opacity="0.2"/>
</svg>
