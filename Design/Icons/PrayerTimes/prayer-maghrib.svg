<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Maghrib: Sun setting below horizon, last rays -->
  <line x1="2" y1="14" x2="22" y2="14" stroke="#B08D3E" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Sun sinking below -->
  <path d="M8.5 14C8.5 12 10 10 12 10C14 10 15.5 12 15.5 14" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Last visible rays above horizon -->
  <line x1="12" y1="7.5" x2="12" y2="9" stroke="#B08D3E" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="8.5" y1="8.5" x2="9.5" y2="9.5" stroke="#B08D3E" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
  <line x1="15.5" y1="8.5" x2="14.5" y2="9.5" stroke="#B08D3E" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
  <!-- Warm glow arcs -->
  <path d="M5 14C6 11 9 9 12 9C15 9 18 11 19 14" stroke="#B08D3E" stroke-width="0.6" stroke-linecap="round" opacity="0.15"/>
</svg>