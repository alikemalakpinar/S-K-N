  <line x1="8.5" y1="11.5" x2="9.3" y2="12.8" stroke="#B08D3E" stroke-width="0.8" stroke-linecap="round" opacity="0.25"/>
  <line x1="15.5" y1="11.5" x2="14.7" y2="12.8" stroke="#B08D3E" stroke-width="0.8" stroke-linecap="round" opacity="0.25"/>
  <!-- Crescent moon -->
  <path d="M14 5C14 7.2 12.2 9 10 9C9.3 9 8.6 8.8 8 8.5C8.8 9.4 10 10 11.3 10C13.5 10 15.3 8.2 15.3 6C15.3 4.7 14.6 3.5 13.5 2.8C13.8 3.4 14 4.2 14 5Z" fill="#B08D3E" opacity="0.5"/>
