  <circle cx="14" cy="9" r="3" stroke="#B08D3E" stroke-width="1.5"/>
  <!-- Descending rays -->
  <line x1="14" y1="4" x2="14" y2="5" stroke="#B08D3E" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="18" y1="6" x2="17.3" y2="6.7" stroke="#B08D3E" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
  <line x1="18.5" y1="9" x2="17.5" y2="9" stroke="#B08D3E" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
  <!-- Shadow line (elongated) -->
  <line x1="10" y1="20" x2="5" y2="20" stroke="#B08D3E" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <line x1="11" y1="18" x2="11" y2="20" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
</svg>