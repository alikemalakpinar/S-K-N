<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Eight-pointed Islamic star (two overlapping squares rotated 45 degrees) -->
  <!-- Square 1 (upright, rotated 45deg) -->
  <polygon points="60,24 84,48 84,72 60,96 36,72 36,48" />
  <!-- Square 2 (rotated to create 8-pointed star) -->
  <polygon points="60,28 92,60 60,92 28,60" />
  <!-- Inner octagonal frame -->
  <polygon points="60,38 72,46 78,60 72,74 60,82 48,74 42,60 48,46" />
  <!-- Crescent moon nested inside -->
  <path d="M54,50 A10,10 0 1,0 54,70 A7.5,7.5 0 1,1 54,50" />
  <!-- Decorative dots at each star point -->
  <circle cx="60" cy="20" r="1.5" fill="#B08D3E" stroke="none" />
  <circle cx="96" cy="60" r="1.5" fill="#B08D3E" stroke="none" />
  <circle cx="60" cy="100" r="1.5" fill="#B08D3E" stroke="none" />
  <circle cx="24" cy="60" r="1.5" fill="#B08D3E" stroke="none" />
  <circle cx="84" cy="36" r="1.2" fill="#B08D3E" stroke="none" />
  <circle cx="84" cy="84" r="1.2" fill="#B08D3E" stroke="none" />
  <circle cx="36" cy="84" r="1.2" fill="#B08D3E" stroke="none" />
  <circle cx="36" cy="36" r="1.2" fill="#B08D3E" stroke="none" />
</svg>
