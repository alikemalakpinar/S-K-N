<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <!-- Outward-spreading concentric arcs (broadcast/share) -->
  <!-- Center dot -->
  <circle cx="12" cy="20" r="1.5" fill="#B08D3E"/>
  <!-- Inner arc -->
  <path d="M8 16C8 13.8 9.8 12 12 12C14.2 12 16 13.8 16 16" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Middle arc -->
  <path d="M5 14C5 10.1 8.1 7 12 7C15.9 7 19 10.1 19 14" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round" opacity="0.6" fill="none"/>
  <!-- Outer arc -->
  <path d="M2 12C2 6.5 6.5 2 12 2C17.5 2 22 6.5 22 12" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round" opacity="0.3" fill="none"/>
  <!-- Vertical line from dot -->
  <line x1="12" y1="18.5" x2="12" y2="16" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round"/>
</svg>
