  <rect x="3" y="15" width="3" height="5" rx="0.8" fill="#B08D3E" opacity="0.3"/>
  <rect x="8" y="12" width="3" height="8" rx="0.8" fill="#B08D3E" opacity="0.4"/>
  <rect x="13" y="9" width="3" height="11" rx="0.8" fill="#B08D3E" opacity="0.5"/>
  <rect x="18" y="6" width="3" height="14" rx="0.8" fill="#B08D3E" opacity="0.35"/>
  <!-- Bar outlines -->
  <rect x="3" y="15" width="3" height="5" rx="0.8" stroke="#B08D3E" stroke-width="1.5"/>
  <rect x="8" y="12" width="3" height="8" rx="0.8" stroke="#B08D3E" stroke-width="1.5"/>
