<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <!-- Circular counter with refresh arrow - Kaza (missed prayers) -->
  <!-- Secondary: inner circle fill -->
  <circle cx="12" cy="12" r="8" fill="#B08D3E" opacity="0.15"/>
  <!-- Primary: outer circle -->
  <circle cx="12" cy="12" r="8" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Refresh arrow arc -->
  <path d="M16.5 12A4.5 4.5 0 0 1 7.8 13.5" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M7.5 12A4.5 4.5 0 0 1 16.2 10.5" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Arrow heads -->
  <path d="M7.8 13.5L7.8 11.2L10 13.5" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <path d="M16.2 10.5L16.2 12.8L14 10.5" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="12" cy="12" r="1.2" fill="#B08D3E" opacity="0.5"/>
</svg>
