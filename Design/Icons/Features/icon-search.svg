<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <!-- Magnifying glass with geometric star inside lens -->
  <!-- Secondary: lens fill -->
  <circle cx="10.5" cy="10.5" r="6.5" fill="#B08D3E" opacity="0.1"/>
  <!-- Primary: magnifying glass circle -->
  <circle cx="10.5" cy="10.5" r="6.5" stroke="#B08D3E" stroke-width="1.5"/>
  <!-- Handle -->
  <path d="M15.5 15.5L21 21" stroke="#B08D3E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Geometric 6-pointed star inside lens -->
  <!-- Triangle up -->
  <path d="M10.5 6.5L13 11L8 11Z" stroke="#B08D3E" stroke-width="1" stroke-linejoin="round" opacity="0.5"/>
  <!-- Triangle down -->
  <path d="M10.5 14.5L8 10L13 10Z" stroke="#B08D3E" stroke-width="1" stroke-linejoin="round" opacity="0.5"/>
  <!-- Star fill -->
  <path d="M10.5 6.5L13 11L10.5 14.5L8 11Z" fill="#B08D3E" opacity="0.15"/>
</svg>
