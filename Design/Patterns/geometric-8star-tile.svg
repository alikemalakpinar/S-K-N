<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!--
    Seamless tileable 8-pointed star (octagram) Islamic geometric pattern.
    Based on the classic Islamic {8/3} star tessellation.
    Tiles seamlessly when repeated in both axes.
    Gold #B08D3E, 0.5px stroke, no fill.
  -->
  <defs>
    <style>
      .s { fill: none; stroke: #B08D3E; stroke-width: 0.5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <g class="s">
    <!--
      Grid: stars centered at (0,0), (100,0), (200,0),
            (0,100), (100,100), (200,100),
            (0,200), (100,200), (200,200)
      Star outer radius R = 41.42 (100*(sqrt(2)-1))
      This ensures stars from adjacent grid points interlock.

      8-pointed star {8/2} vertices:
        Outer tips at angles k*45 deg, k=0..7, radius R
        Inner notches at angles (k+0.5)*45 deg, radius r
        r = R * cos(45) / cos(22.5) = R * 0.7654 ~ 31.72
    -->

    <!-- Function: 8-pointed star at (cx, cy) -->
    <!-- R=41.42, r=31.72 -->
    <!-- Outer: (cx+R*cos(k*45), cy+R*sin(k*45)) for k=0..7 -->
    <!-- Inner: (cx+r*cos((k+0.5)*45), cy+r*sin((k+0.5)*45)) for k=0..7 -->

    <!-- Central star at (100,100) -->
    <polygon points="
      141.42,100
      122.43,122.43
      100,141.42
      77.57,122.43
      58.58,100
      77.57,77.57
      100,58.58
      122.43,77.57
    "/>
    <!-- Inner octagon -->
    <polygon points="
      131.72,100
      122.43,122.43
      100,131.72
      77.57,122.43
      68.28,100
      77.57,77.57
      100,68.28
      122.43,77.57
    "/>

    <!-- Star at (0,0) -->
    <polygon points="
      41.42,0  22.43,22.43  0,41.42  -22.43,22.43
      -41.42,0  -22.43,-22.43  0,-41.42  22.43,-22.43
    "/>
    <polygon points="
      31.72,0  22.43,22.43  0,31.72  -22.43,22.43
      -31.72,0  -22.43,-22.43  0,-31.72  22.43,-22.43
    "/>

    <!-- Star at (100,0) -->
    <polygon points="
      141.42,0  122.43,22.43  100,41.42  77.57,22.43
      58.58,0  77.57,-22.43  100,-41.42  122.43,-22.43
    "/>
    <polygon points="
      131.72,0  122.43,22.43  100,31.72  77.57,22.43
      68.28,0  77.57,-22.43  100,-31.72  122.43,-22.43
    "/>

    <!-- Star at (200,0) -->
    <polygon points="
      241.42,0  222.43,22.43  200,41.42  177.57,22.43
      158.58,0  177.57,-22.43  200,-41.42  222.43,-22.43
    "/>
    <polygon points="
      231.72,0  222.43,22.43  200,31.72  177.57,22.43
      168.28,0  177.57,-22.43  200,-31.72  222.43,-22.43
    "/>

    <!-- Star at (0,100) -->
    <polygon points="
      41.42,100  22.43,122.43  0,141.42  -22.43,122.43
      -41.42,100  -22.43,77.57  0,58.58  22.43,77.57
    "/>
    <polygon points="
      31.72,100  22.43,122.43  0,131.72  -22.43,122.43
      -31.72,100  -22.43,77.57  0,68.28  22.43,77.57
    "/>

    <!-- Star at (200,100) -->
    <polygon points="
      241.42,100  222.43,122.43  200,141.42  177.57,122.43
      158.58,100  177.57,77.57  200,58.58  222.43,77.57
    "/>
    <polygon points="
      231.72,100  222.43,122.43  200,131.72  177.57,122.43
      168.28,100  177.57,77.57  200,68.28  222.43,77.57
    "/>

    <!-- Star at (0,200) -->
    <polygon points="
      41.42,200  22.43,222.43  0,241.42  -22.43,222.43
      -41.42,200  -22.43,177.57  0,158.58  22.43,177.57
    "/>
    <polygon points="
      31.72,200  22.43,222.43  0,231.72  -22.43,222.43
      -31.72,200  -22.43,177.57  0,168.28  22.43,177.57
    "/>

    <!-- Star at (100,200) -->
    <polygon points="
      141.42,200  122.43,222.43  100,241.42  77.57,222.43
      58.58,200  77.57,177.57  100,158.58  122.43,177.57
    "/>
    <polygon points="
      131.72,200  122.43,222.43  100,231.72  77.57,222.43
      68.28,200  77.57,177.57  100,168.28  122.43,177.57
    "/>

    <!-- Star at (200,200) -->
    <polygon points="
      241.42,200  222.43,222.43  200,241.42  177.57,222.43
      158.58,200  177.57,177.57  200,158.58  222.43,177.57
    "/>
    <polygon points="
      231.72,200  222.43,222.43  200,231.72  177.57,222.43
      168.28,200  177.57,177.57  200,168.28  222.43,177.57
    "/>

    <!-- Interstitial square rosettes between stars -->
    <!-- Square at (50,50) - between stars at (0,0),(100,0),(0,100),(100,100) -->
    <rect x="31.72" y="31.72" width="36.56" height="36.56" transform="rotate(45,50,50)"/>

    <!-- Square at (150,50) -->
    <rect x="131.72" y="31.72" width="36.56" height="36.56" transform="rotate(45,150,50)"/>

    <!-- Square at (50,150) -->
    <rect x="31.72" y="131.72" width="36.56" height="36.56" transform="rotate(45,50,150)"/>

    <!-- Square at (150,150) -->
    <rect x="131.72" y="131.72" width="36.56" height="36.56" transform="rotate(45,150,150)"/>

    <!-- Cross-shaped connectors linking the stars -->
    <!-- Horizontal connectors -->
    <line x1="41.42" y1="0" x2="58.58" y2="0"/>
    <line x1="141.42" y1="0" x2="158.58" y2="0"/>
    <line x1="41.42" y1="100" x2="58.58" y2="100"/>
    <line x1="141.42" y1="100" x2="158.58" y2="100"/>
    <line x1="41.42" y1="200" x2="58.58" y2="200"/>
    <line x1="141.42" y1="200" x2="158.58" y2="200"/>

    <!-- Vertical connectors -->
    <line x1="0" y1="41.42" x2="0" y2="58.58"/>
    <line x1="100" y1="41.42" x2="100" y2="58.58"/>
    <line x1="200" y1="41.42" x2="200" y2="58.58"/>
    <line x1="0" y1="141.42" x2="0" y2="158.58"/>
    <line x1="100" y1="141.42" x2="100" y2="158.58"/>
    <line x1="200" y1="141.42" x2="200" y2="158.58"/>

    <!-- Diagonal connectors to interstitial squares -->
    <line x1="22.43" y1="22.43" x2="31.72" y2="31.72"/>
    <line x1="77.57" y1="22.43" x2="68.28" y2="31.72"/>
    <line x1="22.43" y1="77.57" x2="31.72" y2="68.28"/>
    <line x1="77.57" y1="77.57" x2="68.28" y2="68.28"/>

    <line x1="122.43" y1="22.43" x2="131.72" y2="31.72"/>
    <line x1="177.57" y1="22.43" x2="168.28" y2="31.72"/>
    <line x1="122.43" y1="77.57" x2="131.72" y2="68.28"/>
    <line x1="177.57" y1="77.57" x2="168.28" y2="68.28"/>

    <line x1="22.43" y1="122.43" x2="31.72" y2="131.72"/>
    <line x1="77.57" y1="122.43" x2="68.28" y2="131.72"/>
    <line x1="22.43" y1="177.57" x2="31.72" y2="168.28"/>
    <line x1="77.57" y1="177.57" x2="68.28" y2="168.28"/>

    <line x1="122.43" y1="122.43" x2="131.72" y2="131.72"/>
    <line x1="177.57" y1="122.43" x2="168.28" y2="131.72"/>
    <line x1="122.43" y1="177.57" x2="131.72" y2="168.28"/>
    <line x1="177.57" y1="177.57" x2="168.28" y2="168.28"/>
  </g>
</svg>